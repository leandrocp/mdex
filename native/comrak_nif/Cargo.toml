[package]
name = "comrak_nif"
version = "0.1.0"
authors = ["Leandro Pereira"]
edition = "2021"

[lib]
name = "comrak_nif"
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
rustler = { version = "0.36", features = [
    "derive",
    "nif_version_2_15",
    "serde",
] }
serde = "1.0"
comrak = { version = "0.36", features = ["shortcodes"] }
ammonia = "4.0"
v_htmlescape = "0.15"
log = "0.4"
lol_html = "2.2"

[features]
default = ["nif_version_2_15"]
# Feature necessary for Rustler Precompiled.
nif_version_2_15 = ["rustler/nif_version_2_15"]
